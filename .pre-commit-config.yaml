# Hooks lancés automatiquement avant chaque commit (équivalent Husky).
# Installer une fois : uv run pre-commit install
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff          # linter (corrige ce qui est auto-corrigeable)
        args: [--fix]
      - id: ruff-format   # formateur
